---
- name: Render docker-compose.yml into home (outside repo — avoids git local-modification conflicts)
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ home_path }}/docker-compose.yml"
    mode: "0644"
    backup: true

- name: Ensure .env file exists with WORKSPACE_PASSWORD
  ansible.builtin.copy:
    dest: "{{ home_path }}/.env"
    content: |
      # Set your code-server password here
      WORKSPACE_PASSWORD=changeme
    mode: "0600"
    force: false
