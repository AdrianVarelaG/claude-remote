---
- name: Generate SSH keypair for claude user (used by dev containers for git)
  community.crypto.openssh_keypair:
    path: "{{ home_path }}/.ssh/id_ed25519"
    type: ed25519
    comment: "claude@truenas"
    mode: "0600"
    force: false

- name: Print claude user public key (add this to GitHub/GitLab)
  ansible.builtin.command: cat "{{ home_path }}/.ssh/id_ed25519.pub"
  register: pubkey
  changed_when: false

- name: Show public key
  ansible.builtin.debug:
    msg: "Add this key to GitHub/GitLab SSH keys: {{ pubkey.stdout }}"

- name: Check if oh-my-zsh is installed
  ansible.builtin.stat:
    path: "{{ home_path }}/.oh-my-zsh"
  register: omz_stat

- name: Install oh-my-zsh
  ansible.builtin.git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: "{{ home_path }}/.oh-my-zsh"
    depth: 1
  when: not omz_stat.stat.exists

- name: Clone zsh-autosuggestions plugin
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    dest: "{{ home_path }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
    depth: 1

- name: Clone zsh-syntax-highlighting plugin
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting
    dest: "{{ home_path }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
    depth: 1

- name: Deploy .zshrc from template
  ansible.builtin.template:
    src: zshrc.j2
    dest: "{{ home_path }}/.zshrc"
    mode: "0644"
    backup: true

- name: Deploy .tmux.conf
  ansible.builtin.template:
    src: tmux.conf.j2
    dest: "{{ home_path }}/.tmux.conf"
    mode: "0644"

- name: Add zsh exec to .bashrc (fallback for bash login shells)
  ansible.builtin.blockinfile:
    path: "{{ home_path }}/.bashrc"
    create: true
    marker: "# {mark} ANSIBLE MANAGED — zsh launcher"
    block: |
      # Launch zsh for interactive sessions if not already in zsh
      if [ -n "$PS1" ] && [ -z "$ZSH_VERSION" ] && command -v zsh >/dev/null 2>&1; then
        exec zsh
      fi
