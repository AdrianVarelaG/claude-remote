---
- name: Assert Docker is available
  ansible.builtin.command: docker version
  become: true
  changed_when: false

- name: Create directory structure under home (owned by claude)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ pool_path }}"
    - "{{ home_path }}"
    - "{{ runtime_path }}"
    - "{{ claude_config_path }}"

- name: Fix ownership of any root-owned files under home
  ansible.builtin.file:
    path: "{{ home_path }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    recurse: true
  become: true
