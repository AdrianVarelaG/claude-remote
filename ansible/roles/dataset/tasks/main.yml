---
- name: Assert Docker is available
  ansible.builtin.command: docker version
  become: true
  changed_when: false

- name: Create directory structure under home (owned by claude)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ pool_path }}"
    - "{{ home_path }}"
    - "{{ runtime_path }}"
    - "{{ claude_config_path }}"
    - "{{ repositories_path }}"
