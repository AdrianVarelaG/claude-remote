---
- name: Assert Docker is available
  ansible.builtin.command: docker version
  become: true
  changed_when: false

- name: Create dataset directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  loop:
    - "{{ pool_path }}"
    - "{{ runtime_path }}"
    - "{{ home_path }}"
    - "{{ claude_config_path }}"
    - "{{ repositories_path }}"
  become: true
