---
- name: Assert Docker is available
  ansible.builtin.command: docker version
  become: true
  changed_when: false

- name: Fix ownership of any root-owned files under home (skip symlinks to avoid read-only /usr)
  ansible.builtin.shell:
    cmd: find {{ home_path }} -not -type l \( -not -user {{ ansible_user }} -o -not -group {{ ansible_user }} \) -exec chown {{ ansible_user }}:{{ ansible_user }} {} +
  become: true
  changed_when: false

- name: Create directory structure under home (owned by claude)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ pool_path }}"
    - "{{ home_path }}"
    - "{{ runtime_path }}"
    - "{{ claude_config_path }}"

