---
- name: Set runtime version facts
  ansible.builtin.set_fact:
    node_version: "20.19.2"
    node_arch: "linux-x64"
    jq_version: "1.7.1"

- name: Create Node.js install dir
  ansible.builtin.file:
    path: "{{ runtime_path }}/node"
    state: directory
    mode: "0755"

- name: Create runtime bin dir
  ansible.builtin.file:
    path: "{{ runtime_path }}/bin"
    state: directory
    mode: "0755"

- name: Download Node.js tarball
  ansible.builtin.get_url:
    url: "https://nodejs.org/dist/v{{ node_version }}/node-v{{ node_version }}-{{ node_arch }}.tar.xz"
    dest: "/tmp/node-v{{ node_version }}-{{ node_arch }}.tar.xz"
    mode: "0644"

- name: Extract Node.js
  ansible.builtin.unarchive:
    src: "/tmp/node-v{{ node_version }}-{{ node_arch }}.tar.xz"
    dest: "{{ runtime_path }}/node"
    remote_src: true
    extra_opts: ["--strip-components=1"]
    creates: "{{ runtime_path }}/node/bin/node"

- name: Download static jq binary
  ansible.builtin.get_url:
    url: "https://github.com/jqlang/jq/releases/download/jq-{{ jq_version }}/jq-linux-amd64"
    dest: "{{ runtime_path }}/bin/jq"
    mode: "0755"

- name: Create bin symlinks for node/npm/npx
  ansible.builtin.file:
    src: "{{ runtime_path }}/node/bin/{{ item }}"
    dest: "{{ runtime_path }}/bin/{{ item }}"
    state: link
    force: true
  loop:
    - node
    - npm
    - npx

- name: Check if claude is installed
  ansible.builtin.stat:
    path: "{{ runtime_path }}/node/bin/claude"
  register: claude_stat

- name: Install Claude Code globally
  ansible.builtin.command:
    cmd: "{{ runtime_path }}/node/bin/npm install -g @anthropic-ai/claude-code"
  environment:
    PATH: "{{ runtime_path }}/node/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    npm_config_prefix: "{{ runtime_path }}/node"
  when: not claude_stat.stat.exists
  changed_when: true

- name: Create claude symlink in bin
  ansible.builtin.file:
    src: "{{ runtime_path }}/node/bin/claude"
    dest: "{{ runtime_path }}/bin/claude"
    state: link
    force: true

- name: Check if tree is already available on the system
  ansible.builtin.stat:
    path: /usr/bin/tree
  register: system_tree

- name: Symlink system tree into runtime bin (if present)
  ansible.builtin.file:
    src: /usr/bin/tree
    dest: "{{ runtime_path }}/bin/tree"
    state: link
    force: false
  when: system_tree.stat.exists

- name: Check if tree is already in runtime bin
  ansible.builtin.stat:
    path: "{{ runtime_path }}/bin/tree"
  register: runtime_tree

- name: Download tree .deb (Debian 12 Bookworm — apt is disabled on TrueNAS)
  ansible.builtin.get_url:
    url: "https://ftp.debian.org/debian/pool/main/t/tree/tree_2.1.0-1_amd64.deb"
    dest: "/tmp/tree.deb"
    mode: "0644"
  when: not system_tree.stat.exists and not runtime_tree.stat.exists

- name: Extract tree binary from .deb using Python (dpkg/ar blocked on TrueNAS)
  ansible.builtin.shell:
    cmd: |
      python3 - << 'EOF'
      import os, subprocess, sys

      deb = '/tmp/tree.deb'
      extract_dir = '/tmp/tree-extract'
      os.makedirs(extract_dir, exist_ok=True)

      with open(deb, 'rb') as f:
          f.read(8)  # skip !<arch>\n magic
          while True:
              hdr = f.read(60)
              if len(hdr) < 60:
                  sys.exit('data.tar not found in .deb')
              name = hdr[:16].strip().decode().rstrip('/')
              size = int(hdr[48:58].strip())
              data = f.read(size)
              if size % 2:
                  f.read(1)  # ar alignment padding
              if name.startswith('data.tar'):
                  tmp = f'/tmp/{name}'
                  with open(tmp, 'wb') as out:
                      out.write(data)
                  subprocess.run(
                      ['tar', '-xf', tmp, '-C', extract_dir],
                      check=True
                  )
                  break
      EOF
    creates: /tmp/tree-extract/usr/bin/tree
  when: not system_tree.stat.exists and not runtime_tree.stat.exists

- name: Copy tree binary into runtime bin
  ansible.builtin.copy:
    src: /tmp/tree-extract/usr/bin/tree
    dest: "{{ runtime_path }}/bin/tree"
    mode: "0755"
    remote_src: true
    force: false
  when: not system_tree.stat.exists and not runtime_tree.stat.exists
